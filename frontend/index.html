<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>瓶中四季</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <span id="title-day">🌿 瓶中四季 Day 1/16</span>
    <span id="season-temp" title="当前季节与温度">🌸春天 🌡️15℃</span>
    <span id="env-stats"><span title="湿度：0=干燥 5=适中 10=水涝">💧5</span> <span title="阳光：0=无光 5=适中 10=暴晒">☀️5</span> <span title="肥力：0=贫瘠 10=肥沃">🌱5</span></span>
  </div>
  
  <div class="main-container">
    <div class="canvas-container">
      <canvas id="terrarium" width="480" height="320"></canvas>
    </div>
    <div class="log-container" id="log-panel"></div>
  </div>

  <div class="controls">
    <div class="actions-header">每日投放 (剩余 <span id="action-remain">3</span>/3)</div>
    <div class="materials" id="material-btns"></div>
    <div class="action-buttons">
      <button id="btn-confirm" disabled>▶️ 确认</button>
    </div>
  </div>

  <script src="constants.js"></script>
  <script src="canvas.js"></script>
  <script src="app.js"></script>
</body>
</html>
